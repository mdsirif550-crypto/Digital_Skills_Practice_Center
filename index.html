    <title>Computer Practice Center</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a2e; /* ডার্ক ব্যাকগ্রাউন্ড */
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        /* হেড ব্যানার ডিজাইন */
        .header-banner {
            background: linear-gradient(135deg, #2980b9, #8e44ad);
            color: white;
            padding: 30px 20px;
            margin-bottom: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .header-banner h1 {
            margin: 0;
            font-size: 42px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.6);
        }

        .header-banner p {
            margin: 10px 0 0 0;
            font-size: 18px;
            color: #d1d8e0;
        }

        /* গ্রিড লেআউট */
        .button-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 35px;
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 50px;
        }

        /* 3D বাটন ডিজাইন */
        .btn-3d {
            background-color: var(--bg-color);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 280px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 10px var(--shadow-color);
            transition: box-shadow 0.3s ease, filter 0.3s ease;
            cursor: pointer;
            border: none;
            outline: none;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* বাটনের ভেতরের ছবি ডিজাইন */
        .btn-3d img {
            width: 200px; 
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
            background-color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        /* নড়ে ওঠার (Shake) অ্যানিমেশন তৈরি */
        @keyframes shake {
            0% { transform: translateY(-2px) rotate(0deg); }
            25% { transform: translateY(-2px) rotate(-3deg); }
            50% { transform: translateY(-2px) rotate(3deg); }
            75% { transform: translateY(-2px) rotate(-3deg); }
            100% { transform: translateY(-2px) rotate(0deg); }
        }

        /* মাউস হোভার বা টাচ করলে আলো জ্বলবে এবং কাঁপবে */
        .btn-3d:hover, .btn-3d:focus {
            box-shadow: 0 0 30px var(--bg-color), 0 10px var(--shadow-color);
            filter: brightness(1.2);
            animation: shake 0.4s ease-in-out infinite; /* লাড়া দেওয়ার ইফেক্ট */
        }

        /* বাটনে ক্লিক করার সময় 3D ইফেক্ট (নিচে দেবে যাবে) */
        .btn-3d:active {
            animation: none; /* ক্লিক করলে কাঁপা বন্ধ হবে */
            box-shadow: 0 0 40px var(--bg-color), 0 4px var(--shadow-color);
            transform: translateY(6px);
            filter: brightness(1.4);
        }

    </style>
